<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>我的环渤海湾浪漫手帐 · 3D 地球</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap">
  <!-- 自托管脚本。请务必通过 http://localhost:8000/mobile 打开本页（先运行后端） -->
  <script src="/static/js/globe.gl.min.js"></script>
  <style>
    :root {
      --primary-color: #d87093;
      --secondary-color: #ffb6c1;
      --background-color: #0a0a12;
      --text-color: #eee;
      --shadow-color: rgba(216, 112, 147, 0.25);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--background-color);
      color: var(--text-color);
    }
    .app-container { position: relative; width: 100%; height: 100%; min-height: 100vh; }
    #globeContainer {
      position: absolute;
      left: 0; top: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      min-height: 100vh;
      background: #0a0a12;
    }
    .top-bar {
      position: absolute;
      top: 12px; left: 12px; right: 12px;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(20, 20, 30, 0.9);
      box-shadow: 0 4px 20px var(--shadow-color);
      z-index: 10;
    }
    .title { color: var(--primary-color); font-size: 18px; }
    .subtitle { font-size: 11px; color: #888; margin-top: 4px; }
    /* 信息面板：点击旗帜后展示 */
    .info-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 100%;
      max-width: 340px;
      background: linear-gradient(to left, rgba(20,20,35,0.98), rgba(15,15,25,0.95));
      box-shadow: -8px 0 32px rgba(0,0,0,0.4);
      padding: 16px;
      overflow-y: auto;
      z-index: 20;
      transform: translateX(100%);
      transition: transform 0.35s ease;
    }
    .info-panel.open { transform: translateX(0); }
    .info-panel h2 { color: var(--primary-color); font-size: 20px; margin-bottom: 8px; }
    .info-panel .city-desc { font-size: 13px; color: #aaa; margin-bottom: 12px; line-height: 1.5; }
    .info-panel .days { display: flex; flex-direction: column; gap: 8px; }
    .day-card {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px 12px;
      border-left: 3px solid var(--primary-color);
    }
    .day-card .date { font-size: 11px; color: #888; margin-bottom: 4px; }
    .day-card .desc { font-size: 13px; line-height: 1.45; }
    .btn-back {
      position: absolute;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      border-radius: 999px;
      border: none;
      background: var(--primary-color);
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 16px var(--shadow-color);
      z-index: 25;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .btn-back.visible { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="globeContainer"></div>
    <div class="top-bar">
      <div class="title">My Trip Diary · 3D 地球</div>
      <div class="subtitle">点击地球上的城市旗帜查看行程</div>
    </div>
    <div id="infoPanel" class="info-panel">
      <h2 id="panelCity">—</h2>
      <p id="panelCityDesc" class="city-desc">—</p>
      <div id="panelDays" class="days"></div>
    </div>
    <button type="button" id="btnBack" class="btn-back">返回地球</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // 等一帧确保 #globeContainer 已有尺寸再初始化
      requestAnimationFrame(function () {
        try {
          initGlobe();
        } catch (err) {
          console.error(err);
          var el = document.getElementById('globeContainer');
          el.innerHTML = '<p style="color:#f88;padding:20px;">加载失败: ' + (err.message || err) + '</p>';
        }
      });
    });

    function initGlobe() {
    // 数据（与原有一致）
    const tripData = {
      '大连': { coords: [38.92, 121.62], itinerary: '大连：抵达与海鲜之旅。' },
      '烟台': { coords: [37.52, 121.39], itinerary: '烟台：海风与邮轮的记忆。' },
      '威海': { coords: [37.50, 122.10], itinerary: '威海：干净安静的海滨小城。' },
      '青岛': { coords: [36.07, 120.33], itinerary: '青岛：啤酒、红瓦与海浪。' },
      '郑州': { coords: [34.75, 113.62], itinerary: '郑州：旅程的收尾与返程。' }
    };
    const dateEntries = [
      { year: '2016', month: '01', day: '28', city: '大连', desc: '抵达大连，入住酒店。' },
      { year: '2016', month: '01', day: '29', city: '大连', desc: '海鲜市场大快朵颐。' },
      { year: '2016', month: '01', day: '30', city: '烟台', desc: '下午坐邮轮前往烟台。' },
      { year: '2016', month: '01', day: '31', city: '烟台', desc: '逛逛烟台市区。' },
      { year: '2016', month: '02', day: '01', city: '烟台', desc: '继续在烟台附近海边散步。' },
      { year: '2016', month: '02', day: '02', city: '威海', desc: '抵达威海，初见干净海岸线。' },
      { year: '2016', month: '02', day: '03', city: '威海', desc: '威海深度游一天。' },
      { year: '2016', month: '02', day: '04', city: '青岛', desc: '前往青岛，入住老城区附近。' },
      { year: '2016', month: '02', day: '05', city: '青岛', desc: '打卡栈桥、啤酒街与老建筑。' },
      { year: '2016', month: '02', day: '06', city: '青岛', desc: '继续在青岛随意慢逛。' },
      { year: '2016', month: '02', day: '07', city: '郑州', desc: '从青岛回到郑州，旅程收尾。' }
    ];

    const pointsData = Object.entries(tripData).map(([city, data]) => ({
      city,
      lat: data.coords[0],
      lng: data.coords[1],
      altitude: 0.08,
      color: '#d87093'
    }));

    const container = document.getElementById('globeContainer');
    if (typeof Globe === 'undefined') {
      container.innerHTML = '<div style="color:#fff;padding:24px;max-width:360px;line-height:1.6;">' +
        '<p style="color:#f88;margin-bottom:12px;">Globe 脚本未加载成功。</p>' +
        '<p>请先在本机启动后端，再用浏览器访问：</p>' +
        '<p style="margin:12px 0;"><strong>http://localhost:8000/mobile</strong></p>' +
        '<p style="font-size:12px;color:#888;">在项目根目录执行：<br>uvicorn backend.server:app --reload --port 8000</p>' +
        '</div>';
      return;
    }

    const globe = Globe()
      .globeImageUrl('/static/earth.jpg')
      .showAtmosphere(true)
      .atmosphereColor('lightskyblue')
      .atmosphereAltitude(0.15)
      .htmlElementsData(pointsData)
      .htmlLat(d => d.lat)
      .htmlLng(d => d.lng)
      .htmlAltitude(0.05)
      .htmlElement(d => {
        const el = document.createElement('div');
        el.style.cssText = 'display:flex;flex-direction:column;align-items:center;cursor:pointer;pointer-events:auto;user-select:none;-webkit-user-select:none;padding:8px;';
        el.innerHTML = '<span style="font-size:28px;line-height:1;pointer-events:none;">🚩</span>' +
          '<span style="font-size:11px;color:#ffb6c1;text-shadow:0 1px 3px #000;margin-top:2px;pointer-events:none;">' + d.city + '</span>';
        el.dataset.city = d.city;
        el.addEventListener('click', (e) => { e.stopPropagation(); goToCity(d); });
        return el;
      })
      (container);

    function goToCity(point) {
      const city = point.city;
      const ctrl = globe.controls && globe.controls();
      if (ctrl) ctrl.autoRotate = false;
      globe.pointOfView({ lat: point.lat, lng: point.lng, altitude: 0.6 }, 1000);
      setTimeout(() => {
        showCityInfo(city);
        document.getElementById('infoPanel').classList.add('open');
        document.getElementById('btnBack').classList.add('visible');
      }, 400);
    }

    function showCityInfo(city) {
      const base = tripData[city] || {};
      document.getElementById('panelCity').textContent = city;
      document.getElementById('panelCityDesc').textContent = base.itinerary || '';
      const daysEl = document.getElementById('panelDays');
      daysEl.innerHTML = '';
      const entries = dateEntries.filter(e => e.city === city);
      entries.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'day-card';
        const dateStr = `${entry.year}年${parseInt(entry.month, 10)}月${parseInt(entry.day, 10)}日`;
        card.innerHTML = `<div class="date">${dateStr}</div><div class="desc">${entry.desc}</div>`;
        daysEl.appendChild(card);
      });
    }

    document.getElementById('btnBack').onclick = function () {
      document.getElementById('infoPanel').classList.remove('open');
      this.classList.remove('visible');
      const ctrl = globe.controls && globe.controls();
      if (ctrl) { ctrl.autoRotate = true; ctrl.autoRotateSpeed = 0.6; }
      globe.pointOfView({ lat: 0, lng: 0, altitude: 2.5 }, 1200);
    };

    globe.onGlobeReady(() => {
      const ctrl = globe.controls && globe.controls();
      if (ctrl) {
        ctrl.autoRotate = true;
        ctrl.autoRotateSpeed = 3;
        setTimeout(() => {
          if (globe.controls) globe.controls().autoRotateSpeed = 0.8;
        }, 2500);
      }
    });

    // 手机端：用全局 touch 追踪识别点击 vs 拖拽
    let touchStartX = 0, touchStartY = 0, touchTarget = null;
    container.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchTarget = document.elementFromPoint(touchStartX, touchStartY);
      }
    }, { passive: true });
    container.addEventListener('touchend', (e) => {
      if (e.changedTouches.length === 1) {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.sqrt(dx * dx + dy * dy) < 10 && touchTarget) {
          // 找到最近的带 data-city 的祖先
          const flagEl = touchTarget.closest('[data-city]');
          if (flagEl) {
            const cityName = flagEl.dataset.city;
            const point = pointsData.find(p => p.city === cityName);
            if (point) goToCity(point);
          }
        }
      }
      touchTarget = null;
    }, { passive: true });

    globe.pointOfView({ lat: 35, lng: 118, altitude: 2.2 });
    }
  </script>
</body>
</html>
